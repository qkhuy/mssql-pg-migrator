name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"
      - name: Vet
        run: go vet ./...
      - name: Vet (integration tag compiles)
        run: go vet -tags integration ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...
