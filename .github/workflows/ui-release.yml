name: Build UI

# Builds the Wails desktop GUI. Unlike the CLI, the GUI cannot be
# cross-compiled — each OS is built on its own native runner (it needs that
# platform's WebView). Runs on demand and on v* tags; on a tag it attaches the
# GUI binaries to the same GitHub Release as the CLI artifacts.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the build to (e.g. v0.1.0)"
        required: false
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ui ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            bin: migrator-ui.exe
            asset: migrator-ui_windows_amd64.exe
          - os: ubuntu-latest
            platform: linux/amd64
            tags: webkit2_41
            bin: migrator-ui
            asset: migrator-ui_linux_amd64
          - os: macos-latest
            platform: darwin/universal
            bin: migrator-ui.app
            asset: migrator-ui_macos_universal.zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: ui/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux WebView deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop app
        working-directory: ui
        # wails build runs `npm install` + the Svelte build and generates the
        # JS bindings automatically; output lands in ui/build/bin/.
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.tags && format('-tags {0}', matrix.tags) || '' }}

      - name: Package
        working-directory: ui/build/bin
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "macOS" ]; then
            ditto -c -k --keepParent "${{ matrix.bin }}" "out/${{ matrix.asset }}"
          else
            cp "${{ matrix.bin }}" "out/${{ matrix.asset }}"
          fi
          ls -lh out/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ui/build/bin/out/*

      - name: Attach to release
        if: github.ref_type == 'tag' || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: ui/build/bin/out/*
